<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vaccination Management | FARMY</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{--primary:#2e7d32;--light:#e8f5e9;--bg:#f4f6f8;}
    body{background:var(--bg);font-family:Arial,sans-serif;}
    .navbar{background:var(--primary);} 
    .page-title{color:var(--primary);} 
    .card{border-radius:12px;} 
    .btn-success{background:var(--primary);border:none;} 
    .table th{background:var(--light);} 
    .badge-pending{background:#f57c00;}
    .badge-done{background:#2e7d32;}
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">Vaccination Management</span>
  <a href="../dashboard.html" class="btn btn-light btn-sm">Back to Dashboard</a>
</nav>

<div class="container py-4">

  <!-- ADD VACCINATION SCHEDULE -->
  <div class="card p-4 mb-4">
    <h4 class="page-title">Create Vaccination Schedule</h4>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Batch Name</label>
        <select id="batchName" class="form-control">
          <option value="">-- Select Existing Batch --</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Vaccine Name</label>
        <input id="vaccineName" type="text" class="form-control" placeholder="FMD, Swine Flu">
      </div>
      <div class="col-md-3">
        <label class="form-label">Vaccination Date</label>
        <input id="vaccineDate" type="date" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">Reminder (days before)</label>
        <input id="reminderDays" type="number" min="0" class="form-control" placeholder="2">
      </div>
    </div>
    <button id="addVaccineBtn" class="btn btn-success mt-4">Add Schedule</button>
  </div>

  <!-- VACCINATION TABLE -->
  <div class="card p-4">
    <h4 class="page-title">Vaccination Schedule</h4>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Batch</th>
          <th>Vaccine</th>
          <th>Date</th>
          <th>Reminder</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="vaccineTable">
        <tr id="emptyRow">
          <td colspan="6" class="text-center text-muted">No vaccination schedules added</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  // ================= MOCK EXISTING BATCHES =================
  // In real system, this will come from Animal module / database
  const existingBatches = ['A', 'B', 'Grower-1', 'Shed-2'];

  // Populate batch dropdown
  const batchSelect = document.getElementById('batchName');
  existingBatches.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    batchSelect.appendChild(opt);
  });

  document.getElementById('addVaccineBtn').addEventListener('click', addVaccine);

  function addVaccine(){
    const batch = batchSelect.value;
    const vaccine = document.getElementById('vaccineName').value.trim();
    const date = document.getElementById('vaccineDate').value;
    const reminder = document.getElementById('reminderDays').value;

    if(!batch){
      alert('Please select an existing batch');
      return;
    }
    if(!vaccine || !date){
      alert('Please fill all required fields');
      return;
    }

    const table = document.getElementById('vaccineTable');
    const empty = document.getElementById('emptyRow');
    if(empty) empty.remove();

    const row = table.insertRow();
    row.insertCell(0).innerText = batch;
    row.insertCell(1).innerText = vaccine;
    row.insertCell(2).innerText = date;
    row.insertCell(3).innerText = reminder ? reminder + ' days' : '-';
    row.insertCell(4).innerHTML = '<span class="badge badge-pending">PENDING</span>';
    row.insertCell(5).innerHTML = `
      <button class="btn btn-sm btn-success mark-btn">Mark Done</button>
      <button class="btn btn-sm btn-danger delete-btn">Delete</button>`;

    document.getElementById('vaccineName').value='';
    document.getElementById('vaccineDate').value='';
    document.getElementById('reminderDays').value='';
  }

  document.addEventListener('click',function(e){
    if(e.target.classList.contains('mark-btn')){
      const statusCell = e.target.closest('tr').children[4];
      statusCell.innerHTML = '<span class="badge badge-done">DONE</span>';
    }

    const del = e.target.closest('.delete-btn');
    if(del){
      if(confirm('Delete this vaccination schedule?')){
        del.closest('tr').remove();
        alert('Vaccination schedule deleted');
      }
    }
  });
</script>

</body>
</html>
