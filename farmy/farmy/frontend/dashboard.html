<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard | FARMY</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="css/styles.css" rel="stylesheet">

  <style>
    :root {
      --primary: #2e7d32;
      --bg: #f4f6f8;
    }

    body {
      background: var(--bg);
      font-family: Arial, sans-serif;
    }

    .navbar {
      background: var(--primary);
    }

    .stat-card {
      border-left: 6px solid var(--primary);
      border-radius: 12px;
    }

    .action-card {
      cursor: pointer;
      transition: 0.2s;
      border-radius: 12px;
    }

    .action-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
    }

    .section-title {
      color: var(--primary);
      font-weight: bold;
    }

    .alert-box {
      background: #fff3cd;
      border-left: 6px solid #ff9800;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">🌾 FARMY – Dashboard</span>
    <a href="login.html" class="btn btn-light btn-sm">Logout</a>
  </nav>

  <div class="container py-4">

    <!-- SUMMARY CARDS -->
    <div class="row g-3">
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <h6>Total Animals</h6>
          <h3 id="total-animals">--</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <h6>Sick Animals</h6>
          <h3 id="sick-animals">--</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <h6>Normal Animals</h6>
          <h3 id="vaccinated-animals">--</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card stat-card p-3">
          <h6>Visitors Today</h6>
          <h3 id="visitors-today">--</h3>
        </div>
      </div>
    </div>

    <!-- ALERTS -->
    <div class="row mt-4">
      <div class="col-md-12">
        <div id="alert-box" class="alert-box">
          Loading dashboard data...
        </div>
      </div>
    </div>

    <!-- CHART -->
    <div class="row mt-4">
      <div class="col-md-6">
        <div class="card p-4">
          <div class="chart-wrapper">
            <canvas id="animalStatusChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card p-4">
          <h5 class="section-title mb-3">Quick Stats</h5>
          <div class="row g-2">
            <div class="col-6">
              <div class="stat-item p-2 border rounded">
                <small class="text-muted">Normal</small>
                <h4 id="stat-normal" class="mb-0 text-success">0</h4>
              </div>
            </div>
            <div class="col-6">
              <div class="stat-item p-2 border rounded">
                <small class="text-muted">Sick</small>
                <h4 id="stat-sick" class="mb-0 text-danger">0</h4>
              </div>
            </div>
            <div class="col-6">
              <div class="stat-item p-2 border rounded">
                <small class="text-muted">Isolated</small>
                <h4 id="stat-isolated" class="mb-0 text-warning">0</h4>
              </div>
            </div>
            <div class="col-6">
              <div class="stat-item p-2 border rounded">
                <small class="text-muted">Dead</small>
                <h4 id="stat-dead" class="mb-0 text-secondary">0</h4>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="row mt-4 text-center">
      <h5 class="section-title mb-3">Quick Actions</h5>

      <div class="col-md-3">
        <div class="card p-3 action-card" onclick="location.href='pages/visitors.html'">
          ➕ Add Visitor
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3 action-card" onclick="location.href='pages/animals.html'">
          🐖 Manage Animals
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3 action-card" onclick="location.href='pages/vaccination.html'">
          💉 Vaccination
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3 action-card" onclick="location.href='pages/reports.html'">
          📊 Reports
        </div>
      </div>
    </div>

  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- API Utilities -->
  <script src="js/api.js"></script>

  <!-- Dashboard Logic -->
  <script src="js/dashboard.js"></script>

  <!-- Additional Stats Update -->
  <script>
    // Override the updateCharts function to also update the stat boxes
    const originalLoadDashboard = loadDashboardMetrics;
    window.loadDashboardMetrics = async function () {
      await originalLoadDashboard();

      // Update individual stat boxes
      const metrics = await DashboardAPI.getMetrics();
      document.getElementById('stat-normal').textContent = metrics.normalCount || 0;
      document.getElementById('stat-sick').textContent = metrics.sickCount || 0;
      document.getElementById('stat-isolated').textContent = metrics.isolatedCount || 0;
      document.getElementById('stat-dead').textContent = metrics.deadCount || 0;
    };
  </script>

</body>

</html>
